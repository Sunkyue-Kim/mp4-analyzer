name: Bug report
description: Report incorrect parsing, UI behavior, or validation mismatch.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not attach private media files, malicious payloads, or security-sensitive samples to a public issue.
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest reliable steps or sample-generation command you can share.
      placeholder: |
        1. Open ...
        2. Load ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: media
    attributes:
      label: Media format and codec
      placeholder: "Example: MP4/fMP4 + HEVC + AAC"
  - type: textarea
    id: artifacts
    attributes:
      label: Debug artifacts
      description: Exported JSON, console logs, screenshots, ffprobe output, or a minimal non-private sample link.
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Example: Chrome 126 on Windows 11"
    validations:
      required: true
